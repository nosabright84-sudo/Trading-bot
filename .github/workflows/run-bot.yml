name: Trading Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install pandas python-telegram-bot requests

      - name: Create fresh bot.py
        run: |
          cat > bot.py << 'PY'
          import requests, pandas as pd, asyncio, os, math
          from telegram import Bot
          from datetime import datetime

          TOKEN = os.getenv("TELEGRAM_TOKEN")
          CHAT_ID = int(os.getenv("TELEGRAM_CHAT_ID"))

          STOCKS = ["MSFT","AAPL","NVDA","GOOGL","AMZN","META","TSLA","AVGO","AMD","INTC","QCOM","TXN","MU","AMAT","JPM","V","MA","BAC","WFC","GS","MS","AXP","LLY","UNH","JNJ","MRK","ABBV","TMO","DHR","PFE","WMT","COST","HD","PG","KO","PEP","MCD","NKE","SBUX","XOM","CVX","COP","CAT","BA","GE","HON","UPS","SPY","QQQ","DIA","IWM"]

          def get_quote(t):
              try:
                  url = f"https://stooq.com/q/l/?s={t.lower()}.us&f=sd2t2ohlcv&h&e=csv"
                  r = requests.get(url, timeout=10)
                  close = float(r.text.split('\n')[1].split(',')[6])

                  hist = pd.read_csv(f"https://stooq.com/q/d/l/?s={t.lower()}.us&i=d")
                  hist['Close'] = pd.to_numeric(hist['Close'], errors='coerce')
                  hist = hist.dropna()
                  delta = hist['Close'].diff()
                  gain = delta.where(delta > 0, 0).rolling(14).mean()
                  loss = -delta.where(delta < 0, 0).rolling(14).mean()
                  rs = gain / loss.replace(0, 0.0001)
                  rsi = 100 - (100 / (1 + rs))
                  rsi_val = float(rsi.iloc[-1])
                  if math.isnan(rsi_val): rsi_val = 50
                  sig = "HOLD"
                  if rsi_val < 35: sig = "BUY"
                  elif rsi_val > 70: sig = "SELL"
                  return t, close, rsi_val, sig
              except Exception as e:
                  print(f"{t} error {e}")
                  return t, None, None, "ERROR"

          def get_crypto():
              try:
                  r = requests.get("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd", timeout=10).json()
                  return [("BTC-USD", r['bitcoin']['usd'], 50, "HOLD"), ("ETH-USD", r['ethereum']['usd'], 50, "HOLD")]
              except:
                  return []

          async def main():
              bot = Bot(token=TOKEN)
              results = []
              loop = asyncio.get_event_loop()
              for t in STOCKS:
                  _, p, rsi, sig = await loop.run_in_executor(None, lambda t=t: get_quote(t))
                  if p: results.append((t,p,rsi,sig))
              results += get_crypto()

              lines = [f"*✅ REAL LIVE - {datetime.utcnow().strftime('%H:%M UTC')}*\n"]
              for ticker, price, rsi, sig in results:
                  emoji = "🟢" if sig=="BUY" else "🔴" if sig=="SELL" else "🟡"
                  lines.append(f"*{ticker}* {emoji} {sig}\n${price:,.2f} | RSI {rsi:.1f}\n")

              msg = "\n".join(lines)
              for i in range(0, len(lines), 30):
                  chunk = "\n".join(lines[i:i+30])
                  if len(chunk) > 20:
                      await bot.send_message(chat_id=CHAT_ID, text=chunk, parse_mode='Markdown')

          asyncio.run(main())
          PY

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
