name: Trading Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade --force-reinstall yfinance pandas python-telegram-bot curl_cffi

      - name: Run real-time bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_FULL_REPORT: ${{ vars.SEND_FULL_REPORT || 'true' }}
        run: |
          echo "Finding bot.py..."
          BOT_PATH=$(find . -name "bot.py" -type f | head -n 1)
          echo "Found at: $BOT_PATH"
          python "$BOT_PATH"

      - name: Commit state file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_signals.json || echo "No state file"
          git diff --quiet && git diff --staged --quiet || git commit -m "Update last_signals.json [skip ci]"
          git push
