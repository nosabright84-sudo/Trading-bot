name: Trading Bot
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install pandas python-telegram-bot requests
      - name: Create bot
        run: |
          cat > bot.py << 'PY'
          import requests, pandas as pd, asyncio, os, math, time
          from telegram import Bot
          from datetime import datetime

          TOKEN = os.getenv("TELEGRAM_TOKEN")
          CHAT_ID = int(os.getenv("TELEGRAM_CHAT_ID"))
          FINNHUB = os.getenv("FINNHUB_KEY")

          if not FINNHUB or FINNHUB == "demo":
              print("ERROR: FINNHUB_KEY missing or demo! Go to GitHub Secrets and add real key")
          
          STOCKS = ["MSFT","AAPL","NVDA","GOOGL","AMZN","META","TSLA","AVGO","AMD","INTC","QCOM","TXN","MU","AMAT","JPM","V","MA","BAC","WFC","GS","MS","AXP","LLY","UNH","JNJ","MRK","ABBV","TMO","DHR","PFE","WMT","COST","HD","PG","KO","PEP","MCD","NKE","SBUX","XOM","CVX","COP","CAT","BA","GE","HON","UPS","SPY","QQQ","DIA","IWM"]

          def get_stock(t):
              try:
                  now = int(time.time())
                  ago = now - 120*24*60*60
                  # price
                  rq = requests.get(f"https://finnhub.io/api/v1/quote?symbol={t}&token={FINNHUB}", timeout=15).json()
                  price = float(rq.get('c', 0))
                  if price == 0 or price < 1:
                      print(f"{t} bad price {rq}")
                      return t, None, None, "ERROR"
                  # candles for RSI
                  rc = requests.get(f"https://finnhub.io/api/v1/stock/candle?symbol={t}&resolution=D&from={ago}&to={now}&token={FINNHUB}", timeout=15).json()
                  if rc.get('s') != 'ok':
                      print(f"{t} candle {rc.get('s')} -> using price only")
                      return t, price, 50.0, "HOLD"
                  closes = rc.get('c', [])
                  if len(closes) < 20:
                      return t, price, 50.0, "HOLD"
                  df = pd.DataFrame({'Close': closes})
                  delta = df['Close'].diff()
                  gain = delta.where(delta > 0, 0)
                  loss = -delta.where(delta < 0, 0)
                  avg_gain = gain.ewm(com=13, min_periods=14).mean()
                  avg_loss = loss.ewm(com=13, min_periods=14).mean()
                  rs = avg_gain / avg_loss.replace(0, 0.0001)
                  rsi = 100 - (100 / (1 + rs))
                  rsi_val = float(rsi.iloc[-1])
                  if math.isnan(rsi_val):
                      rsi_val = 50.0
                  sig = "HOLD"
                  if rsi_val < 43: sig = "BUY"
                  elif rsi_val > 67: sig = "SELL"
                  print(f"{t} OK ${price:.2f} RSI {rsi_val:.1f} {sig}")
                  return t, price, rsi_val, sig
              except Exception as e:
                  print(f"{t} EXC {e}")
                  return t, None, None, "ERROR"

          def get_crypto():
              try:
                  btc = requests.get("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT", timeout=10).json()
                  eth = requests.get("https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT", timeout=10).json()
                  return [("BTC", float(btc['price']), 50.0, "HOLD"), ("ETH", float(eth['price']), 50.0, "HOLD")]
              except:
                  r = requests.get("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd", timeout=10).json()
                  return [("BTC", float(r['bitcoin']['usd']), 50.0, "HOLD"), ("ETH", float(r['ethereum']['usd']), 50.0, "HOLD")]

          async def main():
              bot = Bot(token=TOKEN)
              loop = asyncio.get_event_loop()
              results = []
              for t in STOCKS:
                  _, p, rsi, sig = await loop.run_in_executor(None, lambda t=t: get_stock(t))
                  if p: results.append((t,p,rsi,sig))
                  await asyncio.sleep(1.2)  # IMPORTANT: 1.2s to avoid 60/min limit
              
              crypto = get_crypto()
              all_res = crypto + results
              lines = [f"*✅ REAL FINNHUB - {datetime.utcnow().strftime('%H:%M UTC')} | BUY<43 SELL>67*\n"]
              for ticker, price, rsi, sig in all_res:
                  emoji = "🟢" if sig=="BUY" else "🔴" if sig=="SELL" else "🟡"
                  lines.append(f"*{ticker}* {emoji} {sig}\n${price:,.2f} | RSI {rsi:.1f}\n")
              for i in range(0, len(lines), 22):
                  chunk = "\n".join(lines[i:i+22])
                  await bot.send_message(chat_id=CHAT_ID, text=chunk, parse_mode='Markdown')
                  await asyncio.sleep(1)

          asyncio.run(main())
          PY
      - name: Run
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python bot.py
