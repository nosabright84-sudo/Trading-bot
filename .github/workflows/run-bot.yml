name: Trading Bot
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install pandas python-telegram-bot requests
      - name: Create bot
        run: |
          cat > bot.py << 'PY'
          import requests, pandas as pd, asyncio, os, math, time
          from telegram import Bot
          from datetime import datetime
          TOKEN = os.getenv("TELEGRAM_TOKEN")
          CHAT_ID = int(os.getenv("TELEGRAM_CHAT_ID"))
          FINNHUB = os.getenv("FINNHUB_KEY")
          STOCKS = ["MSFT","AAPL","NVDA","GOOGL","AMZN","META","TSLA","AVGO","AMD","INTC","QCOM","TXN","MU","AMAT","JPM","V","MA","BAC","WFC","GS","MS","AXP","LLY","UNH","JNJ","MRK","ABBV","TMO","DHR","PFE","WMT","COST","HD","PG","KO","PEP","MCD","NKE","SBUX","XOM","CVX","COP","CAT","BA","GE","HON","UPS","SPY","QQQ","DIA","IWM"]

          def get_rsi_from_stooq(ticker):
              try:
                  # Stooq daily history is free and unlimited
                  url = f"https://stooq.com/q/d/l/?s={ticker.lower()}.us&i=d"
                  df = pd.read_csv(url)
                  if len(df) < 30:
                      return 50.0
                  df['Close'] = pd.to_numeric(df['Close'], errors='coerce')
                  df = df.dropna(subset=['Close'])
                  if len(df) < 30:
                      return 50.0
                  # Wilder RSI 14
                  delta = df['Close'].diff()
                  gain = delta.where(delta > 0, 0)
                  loss = -delta.where(delta < 0, 0)
                  avg_gain = gain.ewm(com=13, min_periods=14).mean()
                  avg_loss = loss.ewm(com=13, min_periods=14).mean()
                  rs = avg_gain / avg_loss.replace(0, 0.0001)
                  rsi = 100 - (100 / (1 + rs))
                  return float(rsi.iloc[-1])
              except Exception as e:
                  print(f"{ticker} RSI error {e}")
                  return 50.0

          def get_stock(t):
              try:
                  # Live price from Finnhub
                  r = requests.get(f"https://finnhub.io/api/v1/quote?symbol={t}&token={FINNHUB}", timeout=10).json()
                  price = float(r.get('c', 0))
                  if price == 0 or price is None:
                      return t, None, None, "ERROR"
                  rsi_val = get_rsi_from_stooq(t)
                  if math.isnan(rsi_val):
                      rsi_val = 50.0
                  sig = "HOLD"
                  if rsi_val < 42:
                      sig = "BUY"
                  elif rsi_val > 68:
                      sig = "SELL"
                  print(f"{t} ${price} RSI {rsi_val:.1f} {sig}")
                  return t, price, rsi_val, sig
              except Exception as e:
                  print(f"{t} error {e}")
                  return t, None, None, "ERROR"

          def get_crypto():
              try:
                  btc = requests.get("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT", timeout=10).json()
                  eth = requests.get("https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT", timeout=10).json()
                  return [("BTC", float(btc['price']), 50.0, "HOLD"), ("ETH", float(eth['price']), 50.0, "HOLD")]
              except:
                  try:
                      r = requests.get("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd", timeout=10).json()
                      return [("BTC", float(r['bitcoin']['usd']), 50.0, "HOLD"), ("ETH", float(r['ethereum']['usd']), 50.0, "HOLD")]
                  except:
                      return [("BTC", 64707.0, 50.0, "HOLD"), ("ETH", 1879.0, 50.0, "HOLD")]

          async def main():
              bot = Bot(token=TOKEN)
              loop = asyncio.get_event_loop()
              results = []
              for t in STOCKS:
                  _, p, rsi, sig = await loop.run_in_executor(None, lambda t=t: get_stock(t))
                  if p: results.append((t,p,rsi,sig))
                  await asyncio.sleep(0.2)
              results = get_crypto() + results
              lines = [f"*✅ LIVE - {datetime.utcnow().strftime('%H:%M UTC')} | BUY<42 SELL>68*\n"]
              for ticker, price, rsi, sig in results:
                  emoji = "🟢" if sig=="BUY" else "🔴" if sig=="SELL" else "🟡"
                  lines.append(f"*{ticker}* {emoji} {sig}\n${price:,.2f} | RSI {rsi:.1f}\n")
              for i in range(0, len(lines), 25):
                  chunk = "\n".join(lines[i:i+25])
                  if len(chunk.strip()) > 10:
                      await bot.send_message(chat_id=CHAT_ID, text=chunk, parse_mode='Markdown')

          asyncio.run(main())
          PY
      - name: Run
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python bot.py
