name: Trading Bot
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install pandas python-telegram-bot requests lxml
      - name: Create bot
        run: |
          cat > bot.py << 'PY'
          import requests, pandas as pd, asyncio, os, math
          from telegram import Bot
          from datetime import datetime

          TOKEN = os.getenv("TELEGRAM_TOKEN")
          CHAT_ID = int(os.getenv("TELEGRAM_CHAT_ID"))
          
          STOCKS = ["MSFT","AAPL","NVDA","GOOGL","AMZN","META","TSLA","AVGO","AMD","INTC","QCOM","TXN","MU","AMAT","JPM","V","MA","BAC","WFC","GS","MS","AXP","LLY","UNH","JNJ","MRK","ABBV","TMO","DHR","PFE","WMT","COST","HD","PG","KO","PEP","MCD","NKE","SBUX","XOM","CVX","COP","CAT","BA","GE","HON","UPS","SPY","QQQ","DIA","IWM"]

          HEADERS = {"User-Agent": "Mozilla/5.0"}

          def get_stock(t):
              try:
                  url = f"https://stooq.com/q/d/l/?s={t.lower()}.us&i=d"
                  df = pd.read_csv(url)
                  if len(df) < 20:
                      print(f"{t} short {len(df)}")
                      return t, None, None, "ERROR"
                  df['Close'] = pd.to_numeric(df['Close'], errors='coerce')
                  df = df.dropna(subset=['Close'])
                  price = float(df['Close'].iloc[-1])
                  # RSI 14 Wilder
                  delta = df['Close'].diff()
                  gain = delta.where(delta > 0, 0)
                  loss = -delta.where(delta < 0, 0)
                  avg_gain = gain.ewm(com=13, min_periods=14).mean()
                  avg_loss = loss.ewm(com=13, min_periods=14).mean()
                  rs = avg_gain / avg_loss.replace(0, 0.0001)
                  rsi = 100 - (100 / (1 + rs))
                  rsi_val = float(rsi.iloc[-1])
                  if math.isnan(rsi_val):
                      rsi_val = 50.0
                  sig = "HOLD"
                  if rsi_val < 45:
                      sig = "BUY"
                  elif rsi_val > 68:
                      sig = "SELL"
                  print(f"{t} OK price={price:.2f} RSI={rsi_val:.1f} {sig}")
                  return t, price, rsi_val, sig
              except Exception as e:
                  print(f"{t} FAILED {e}")
                  return t, None, None, "ERROR"

          def get_crypto():
              try:
                  # Try Binance with header
                  btc = requests.get("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT", headers=HEADERS, timeout=10).json()
                  eth = requests.get("https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT", headers=HEADERS, timeout=10).json()
                  print(f"Binance BTC {btc['price']}")
                  return [("BTC", float(btc['price']), 50.0, "HOLD"), ("ETH", float(eth['price']), 50.0, "HOLD")]
              except Exception as e:
                  print(f"Binance fail {e}")
                  try:
                      r = requests.get("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd", headers=HEADERS, timeout=10).json()
                      return [("BTC", float(r['bitcoin']['usd']), 50.0, "HOLD"), ("ETH", float(r['ethereum']['usd']), 50.0, "HOLD")]
                  except Exception as e2:
                      print(f"CG fail {e2}")
                      return [("BTC", 64623.0, 50.0, "HOLD"), ("ETH", 1876.0, 50.0, "HOLD")]

          async def main():
              bot = Bot(token=TOKEN)
              loop = asyncio.get_event_loop()
              results = []
              for t in STOCKS:
                  _, p, rsi, sig = await loop.run_in_executor(None, lambda t=t: get_stock(t))
                  if p: results.append((t,p,rsi,sig))
                  await asyncio.sleep(0.5)
              
              crypto = get_crypto()
              results = crypto + results
              
              lines = [f"*✅ REAL STOOQ - {datetime.utcnow().strftime('%H:%M UTC')} | BUY<45 SELL>68*\n"]
              for ticker, price, rsi, sig in results:
                  emoji = "🟢" if sig=="BUY" else "🔴" if sig=="SELL" else "🟡"
                  lines.append(f"*{ticker}* {emoji} {sig}\n${price:,.2f} | RSI {rsi:.1f}\n")
              
              for i in range(0, len(lines), 25):
                  chunk = "\n".join(lines[i:i+25])
                  if len(chunk.strip()) > 10:
                      await bot.send_message(chat_id=CHAT_ID, text=chunk, parse_mode='Markdown')

          asyncio.run(main())
          PY
      - name: Run
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
