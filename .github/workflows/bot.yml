name: Trading Bot

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows manual run from GitHub

permissions:
  contents: write # THIS FIXES THE 403 ERROR

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yfinance pandas python-telegram-bot

      - name: Run real-time bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_FULL_REPORT: ${{ vars.SEND_FULL_REPORT || 'true' }}
        run: |
          python bot.py

      - name: Commit state file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_signals.json || echo "No state file to add"
          git diff --quiet && git diff --staged --quiet || git commit -m "Update last_signals.json [skip ci]"
          git push
