name: Real-Time Trading Alerts
on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes automatically
  workflow_dispatch:        # Also lets you run manually
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install python-telegram-bot yfinance pandas
      - name: Run real-time bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
