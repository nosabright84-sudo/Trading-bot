name: Run Bot at 21:30 Nigeria
on:
  schedule:
    - cron: '30 20 * * *' # 21:30 Lagos = 20:30 UTC
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install python-telegram-bot pytz
      - run: python bot.py
